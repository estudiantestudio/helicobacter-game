<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agente infeccioso - Helicobacter pylori</title>
  <style>
    :root{
      --bg1:#030813;
      --bg2:#071a2f;
      --cyan:#63e7ff;
      --cyan2:#b7f8ff;
      --pink:#ff5fd2;
      --yellow:#ffd86a;
      --glass:rgba(7,18,34,0.60);
      --border:rgba(99,231,255,0.30);
      --red:#ff6b7a;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Arial, Helvetica, sans-serif;
      min-height:100vh;
      color:white;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,180,255,.18), transparent 22%),
        radial-gradient(circle at 80% 25%, rgba(255,0,180,.14), transparent 22%),
        radial-gradient(circle at 60% 75%, rgba(0,255,255,.08), transparent 25%),
        linear-gradient(135deg,var(--bg1),var(--bg2),#13081f);
      overflow:auto;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
    }

    .page{
      width:100%;
      min-height:100vh;
      display:grid;
      grid-template-columns: 360px 1fr 380px;
      gap:16px;
      padding:16px;
    }

    .panel{
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:20px;
      backdrop-filter:blur(10px);
      box-shadow:0 0 25px rgba(99,231,255,.10), inset 0 0 16px rgba(99,231,255,.05);
      overflow:hidden;
    }

    .left, .right{
      display:flex;
      flex-direction:column;
      gap:16px;
      z-index:3;
    }

    .title-box{
      padding:20px;
    }

    .title-box h1{
      font-size:2rem;
      line-height:1.04;
      color:var(--cyan2);
      margin-bottom:10px;
      text-shadow:0 0 14px rgba(99,231,255,.22);
    }

    .title-box p{
      color:#dffaff;
      line-height:1.55;
      font-size:.97rem;
    }

    .section{
      padding:18px;
    }

    .section h2{
      color:var(--cyan2);
      margin-bottom:12px;
      font-size:1.2rem;
    }

    .section ul{
      padding-left:18px;
      display:grid;
      gap:8px;
    }

    .section li{
      color:#eefcff;
      line-height:1.5;
    }

    .back-btn, .scene-btn{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(99,231,255,.30);
      background:linear-gradient(135deg, rgba(99,231,255,.12), rgba(255,95,210,.10));
      color:#fff;
      font-weight:700;
      cursor:pointer;
      transition:.25s ease;
    }

    .back-btn:hover, .scene-btn:hover{
      transform:translateY(-2px);
      border-color:rgba(183,248,255,.85);
      box-shadow:0 0 16px rgba(99,231,255,.14);
    }

    .scene-menu{
      display:grid;
      gap:10px;
    }

    .scene-btn.active{
      border-color:rgba(183,248,255,.95);
      box-shadow:0 0 20px rgba(99,231,255,.18);
    }

    .center{
      position:relative;
      min-height:900px;
      overflow:hidden;
      border-radius:24px;
      border:1px solid rgba(99,231,255,.18);
      background:
        radial-gradient(circle at center, rgba(99,231,255,.08), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      box-shadow:0 0 30px rgba(99,231,255,.07), inset 0 0 20px rgba(99,231,255,.04);
    }

    .scene{
      position:absolute;
      inset:0;
      opacity:0;
      pointer-events:none;
      transition:.45s ease;
    }

    .scene.active{
      opacity:1;
      pointer-events:auto;
    }

    .scene-label{
